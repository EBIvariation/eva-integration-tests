ftp_dir: /opt/ftp/private/
public_ftp_dir: /opt/ftp/public/

opencga_path: /opt/opencga

eloads_dir: /opt/submissions/

eloads_lts_dir: ''

eutils_api_key: ''

genome_downloader:
  output_directory: /opt/reference_sequences

mongodb:
  mongo_admin_uri: mongodb://mongo_db:27017/admin
  mongo_admin_secrets_file: /root/.mongo_admin_prod_pass

vep_path: /usr/local/software/vep
vep_cache_path: /opt/datasources/vep-cache

opencga_path: /opt/software/vep/opencga

maven:
  environment: docker
  settings_file: /root/maven-settings.xml

executable:
  eva_sub_cli: eva-sub-cli.py
  sub_cli_env: /dev/null
  nextflow: /usr/local/bin/nextflow
  vcf_assembly_checker: /usr/local/bin/vcf_assembly_checker
  vcf_validator: /usr/local/bin/vcf_validator
  bgzip: /usr/bin/bgzip
  bcftools: /usr/bin/bcftools
  tabix: /usr/bin/tabix
  md5sum: /usr/bin/md5sum
  samtools: /usr/bin/samtools
  genome_downloader: /usr/local/bin/genome_downloader.py
  bedtools: /usr/bin/bedtools
  minimap2: /usr/bin/minimap2
  python:
    interpreter: python

jar:
  eva_pipeline: /usr/local/software/eva-pipeline.jar
  accession_pipeline: /usr/local/software/eva-accession-pipeline.jar
  clustering: /usr/local/software/eva-accession-clustering.jar
  vcf_extractor: /usr/local/software/eva-remapping-get-source.jar
  vcf_ingestion: /usr/local/software/eva-remapping-ingest.jar
  deprecate: /usr/local/software/eva-accession-deprecate.jar

biosamples:
  bsd_url: https://wwwdev.ebi.ac.uk/biosamples
  webin_url: https://wwwdev.ebi.ac.uk/ena/submit/webin/auth/token

ena:
  submit_url: https://wwwdev.ebi.ac.uk/ena/submit/webin-v2/submit
  submit_async: https://wwwdev.ebi.ac.uk/ena/submit/webin-v2/submit/queue
  ftphost: webin.ebi.ac.uk
  webin_v1_url: http://mock-ws:8080/mocked_web_services/mocked_ena/mocked_hold_date/
  username: mocked_web_services_user
  password: mocked_web_services_pass
  ERA:
    username: oracle_user
    password: oracle_pass
    host: oracle_db
    port: 1521
    database: FREEPDB1

submissions:
  webservice:
    url: http://eva-submission-ws:8080/eva/webservices/submission-ws/v1
    admin_username: eva-submission-ws-admin-user
    admin_password: eva-submission-ws-admin-pass

jar:
  deprecate: /opt/jars/eva-accession-deprecate.jar
  eva_pipeline: /opt/jars/eva-pipeline.jar