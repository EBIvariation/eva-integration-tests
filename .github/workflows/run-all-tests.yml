name: Python tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    strategy:
      matrix:
        test-path:
          - tests/components/eva_sub_cli/
          - tests/components/eva_submission/
          - tests/components/eva_assembly_ingestion/
          - tests/components/eva_release_automation/
    env:
      WEBIN_TEST_USER_EMAIL: ${{ secrets.WEBIN_TEST_USER_EMAIL }}
      WEBIN_TEST_USER_PASSWORD: ${{ secrets.WEBIN_TEST_USER_PASSWORD }}
      EVA_SUBMISSION_WEBIN_USERNAME: ${{ secrets.EVA_SUBMISSION_WEBIN_USERNAME }}
      EVA_SUBMISSION_WEBIN_PASSWORD: ${{ secrets.EVA_SUBMISSION_WEBIN_PASSWORD }}

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: 3.11
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        PYTHONPATH=. pytest ${{ matrix.test-path }}
